<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="description" content="">
<meta name="keywords" content="">
<meta name="author" content="">

<title>شهادة شكر - الإدارة المدرسية</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>

<style>
  :root{
    --green:#6ec5a8;
    --blue:#3f7fbe;
    --dark:#1f4e5f;
    --bg:#f4f8f9;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Cairo',sans-serif;
    background:var(--bg);
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }

  /* ===== HEADER ===== */
  header.hero{
    background:linear-gradient(135deg,var(--green) 0%,var(--blue) 100%);
    color:#fff;
    text-align:center;
    padding:40px 16px 30px;
  }
  header.hero img.logo{
    width:130px;height:130px;
    border-radius:50%;
    background:#fff;
    box-shadow:0 6px 20px rgba(0,0,0,.25);
    object-fit:cover;
    margin-bottom:14px;
  }
  header.hero h1{font-size:1.5rem;font-weight:900}
  header.hero p{opacity:.9;font-size:.95rem;margin-top:4px}

  /* ===== NAV ===== */
  nav.navbar{
    background:#fff;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
    position:sticky;top:0;z-index:10;
  }
  nav.navbar ul{
    display:flex;justify-content:center;list-style:none;
  }
  nav.navbar a{
    display:block;
    padding:14px 34px;
    text-decoration:none;
    color:var(--dark);
    font-weight:700;
    border-bottom:3px solid transparent;
    transition:.2s;
  }
  nav.navbar a.active,
  nav.navbar a:hover{
    color:var(--blue);
    border-bottom-color:var(--green);
  }

  /* ===== CONTENT ===== */
  .wrap{
    flex:1;
    width:100%;
    max-width:760px;
    margin:40px auto;
    padding:0 16px;
  }
  .card{
    background:#fff;
    border-radius:16px;
    box-shadow:0 8px 30px rgba(0,0,0,.08);
    padding:34px 28px;
    text-align:center;
  }
  .card h2{
    color:var(--dark);
    font-weight:900;
    margin-bottom:6px;
  }
  .card .sub{color:#6b7f88;font-size:.95rem;margin-bottom:24px}

  .search-box{display:flex;gap:10px}
  .search-box input{
    flex:1;
    padding:13px 16px;
    border:2px solid #dfe9ec;
    border-radius:10px;
    font-family:inherit;
    font-size:1rem;
    outline:none;
    transition:.2s;
  }
  .search-box input:focus{border-color:var(--blue)}
  .search-box button{
    padding:13px 26px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,var(--green),var(--blue));
    color:#fff;
    font-family:inherit;
    font-weight:700;
    font-size:1rem;
    cursor:pointer;
    transition:.2s;
  }
  .search-box button:hover{opacity:.9;transform:translateY(-1px)}

  .status{margin-top:16px;font-weight:700;color:var(--dark)}

  #pdfContainer{margin-top:16px}
  #pdfContainer canvas{
    width:100%;height:auto;
    border:1px solid #e0e0e0;
    border-radius:8px;
  }

  #downloadBtn{
    display:none;
    margin-top:16px;
    padding:12px 26px;
    background:var(--blue);
    color:#fff;
    border:none;
    border-radius:10px;
    font-family:inherit;
    font-weight:700;
    font-size:1rem;
    cursor:pointer;
  }
  #downloadBtn:hover{background:var(--dark)}

  /* ===== FOOTER ===== */
  footer{
    background:var(--dark);
    color:#fff;
    text-align:center;
    padding:18px 10px;
    font-size:.9rem;
    line-height:2;
  }
  footer a{color:#9fd8c3;text-decoration:none;margin:0 6px}
  footer a:hover{color:#fff}

  /* ===== WHATSAPP ===== */
  .whatsapp-float{
    position:fixed;
    bottom:22px;
    left:22px;
    width:56px;height:56px;
    background:#25d366;
    color:#fff;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:1.7rem;
    box-shadow:0 4px 14px rgba(0,0,0,.25);
    text-decoration:none;
    z-index:20;
  }
  .whatsapp-float:hover{transform:scale(1.08)}

  @media(max-width:480px){
    .search-box{flex-direction:column}
    header.hero h1{font-size:1.2rem}
  }
</style>
</head>

<body>

<!-- ===== HEADER ===== -->
<header class="hero">
  <img class="logo" src="logo.png" alt="وزارة التعليم - الإدارة العامة للتعليم بمنطقة جازان">
 
<p>الإدارة العامة للتعليم بمنطقة جازان</p>
  <h1>قسم الإدارة المدرسية</h1>

</header>

<!-- ===== NAV ===== -->
<nav class="navbar">
  <ul>
    <li><a class="active" href="index.html">الشهادات</a></li>
  </ul>
</nav>

<!-- ===== CONTENT ===== -->
<div class="wrap">
  <div class="card">

    <div class="search-box">
      <input type="text" id="studentId" inputmode="numeric" maxlength="10" placeholder="أدخل رقم الهوية الوطنية">
      <button onclick="searchCertificate()"><i class="fa fa-search"></i> بحث</button>
    </div>

    <div id="result" class="status"></div>
    <div id="pdfContainer"></div>
    <button id="downloadBtn">تحميل الشهادة PDF</button>
  </div>
</div>

<!-- ===== FOOTER ===== -->
<footer>
  <div>
    
  </div>
  <div>جميع الحقوق محفوظة &copy; 2026 - الإدارة المدرسية-تعليم جازان </div>
</footer>

<!-- ===== WHATSAPP FLOAT ===== -->
<a class="whatsapp-float"
   href="https://wa.me/966548884252"
   target="_blank"
   aria-label="تواصل عبر واتساب">
  <i class="fab fa-whatsapp"></i>
</a>

<script>
  let foundPage = null;
  let pdfDoc = null;

  async function searchCertificate() {
    const studentId = document.getElementById('studentId').value.trim();
    const resultDiv = document.getElementById('result');
    const pdfContainer = document.getElementById('pdfContainer');
    const downloadBtn = document.getElementById('downloadBtn');

    pdfContainer.innerHTML = "";
    resultDiv.textContent = "";
    downloadBtn.style.display = "none";

    if (studentId.length !== 10 || isNaN(studentId)) {
      resultDiv.textContent = "رقم الهوية غير صحيح. يجب أن يتكون من 10 أرقام.";
      return;
    }

    resultDiv.textContent = "جاري البحث...";
    const pdfFiles = ['uploads/1.pdf','uploads/2.pdf','uploads/3.pdf','uploads/4.pdf','uploads/5.pdf'];
    let certificateFound = false;

    for (const pdfFile of pdfFiles) {
      try {
        pdfDoc = await pdfjsLib.getDocument(pdfFile).promise;
        for (let pageNum = 1; pageNum <= pdfDoc.numPages; pageNum++) {
          const page = await pdfDoc.getPage(pageNum);
          const textContent = await page.getTextContent();
          const text = textContent.items.map(item => item.str).join(" ");
          if (text.includes(studentId)) {
            displayCertificatePage(page, pdfContainer);
            foundPage = pageNum;
            downloadBtn.style.display = "inline-block";
            certificateFound = true;
            break;
          }
        }
      } catch (e) {
        console.error("PDF load error:", e);
      }
      if (certificateFound) break;
    }

    resultDiv.textContent = certificateFound ? "✅ تم العثور على الشهادة." : "❌ لم يتم العثور على شهادة لهذا الرقم.";
  }

  function displayCertificatePage(page, container) {
    const viewport = page.getViewport({ scale: 1.5 });
    const canvas = document.createElement('canvas');
    const context = canvas.getContext('2d');
    canvas.height = viewport.height;
    canvas.width = viewport.width;
    page.render({ canvasContext: context, viewport: viewport }).promise.then(() => {
      container.appendChild(canvas);
    });
  }

  async function downloadCertificate() {
    if (foundPage && pdfDoc) {
      const pdfBytes = await pdfDoc.getData();
      const existingPdfBytes = new Uint8Array(pdfBytes);
      const pdfDocNew = await PDFLib.PDFDocument.load(existingPdfBytes);
      const newPdf = await PDFLib.PDFDocument.create();
      const [copiedPage] = await newPdf.copyPages(pdfDocNew, [foundPage - 1]);
      newPdf.addPage(copiedPage);
      const newPdfBytes = await newPdf.save();
      const blob = new Blob([newPdfBytes], { type: 'application/pdf' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `الشهادة_${foundPage}.pdf`;
      link.click();
    }
  }
  document.getElementById('downloadBtn').addEventListener('click', downloadCertificate);

  document.getElementById('studentId').addEventListener('keydown', e => {
    if (e.key === 'Enter') searchCertificate();
  });
</script>

</body>
</html>
