
<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="description" content="قسم الإدارة المدرسية  – الشهادات">
<meta name="keywords" content=" تعليم جازان, الشهادات">
<meta name="author" content="الإدارة المدرسية">

<title>الشهادات - قسم الإدارة المدرسية </title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
  :root{
    --green:#6ec5a8;
    --blue:#3f7fbe;
    --dark:#1f4e5f;
    --bg:#f4f8f9;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Cairo',sans-serif;
    background:var(--bg);
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }

  /* ===== HEADER ===== */
  header.hero{
    background:linear-gradient(135deg,var(--green) 0%,var(--blue) 100%);
    color:#fff;
    text-align:center;
    padding:40px 16px 30px;
  }
  header.hero img.logo{
    width:130px;height:130px;
    border-radius:50%;
    background:#fff;
    box-shadow:0 6px 20px rgba(0,0,0,.25);
    object-fit:cover;
    margin-bottom:14px;
  }
  header.hero h1{font-size:1.5rem;font-weight:900}
  header.hero p{opacity:.9;font-size:.95rem;margin-top:4px}

  /* ===== NAV ===== */
  nav.navbar{
    background:#fff;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
    position:sticky;top:0;z-index:10;
  }
  nav.navbar ul{
    display:flex;justify-content:center;list-style:none;
  }
  nav.navbar a{
    display:block;
    padding:14px 34px;
    text-decoration:none;
    color:var(--dark);
    font-weight:700;
    border-bottom:3px solid transparent;
    transition:.2s;
  }
  nav.navbar a.active,
  nav.navbar a:hover{
    color:var(--blue);
    border-bottom-color:var(--green);
  }

  /* ===== CONTENT ===== */
  .wrap{
    flex:1;
    width:100%;
    max-width:560px;
    margin:40px auto;
    padding:0 16px;
  }
  .card{
    background:#fff;
    border-radius:16px;
    box-shadow:0 8px 30px rgba(0,0,0,.08);
    padding:34px 28px;
    text-align:center;
  }
  .card h2{
    color:var(--dark);
    font-weight:900;
    margin-bottom:6px;
  }
  .card .sub{color:#6b7f88;font-size:.95rem;margin-bottom:24px}

  .search-box{display:flex;gap:10px}
  .search-box input{
    flex:1;
    padding:13px 16px;
    border:2px solid #dfe9ec;
    border-radius:10px;
    font-family:inherit;
    font-size:1rem;
    outline:none;
    transition:.2s;
  }
  .search-box input:focus{border-color:var(--blue)}
  .search-box button{
    padding:13px 26px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,var(--green),var(--blue));
    color:#fff;
    font-family:inherit;
    font-weight:700;
    font-size:1rem;
    cursor:pointer;
    transition:.2s;
  }
  .search-box button:hover{opacity:.9;transform:translateY(-1px)}

  #result{margin-top:22px;display:none;text-align:right}
  #result.show{display:block}
  .student{
    background:#f0f9f5;
    border:1px solid #cdeadd;
    border-radius:12px;
    padding:18px;
  }
  .student p{color:var(--dark);margin-bottom:10px;font-weight:600}
  .student a.btn-cert{
    display:inline-block;
    background:var(--blue);
    color:#fff;
    text-decoration:none;
    padding:10px 22px;
    border-radius:8px;
    font-weight:700;
  }
  .student a.btn-cert:hover{background:var(--dark)}
  .notfound{
    background:#fdf1f1;
    border:1px solid #f3caca;
    color:#a33;
    border-radius:12px;
    padding:16px;
    font-weight:600;
    text-align:center;
  }

  /* ===== FOOTER ===== */
  footer{
    background:var(--dark);
    color:#fff;
    text-align:center;
    padding:18px 10px;
    font-size:.85rem;
    line-height:1.8;
  }

  /* ===== WHATSAPP ===== */
  .whatsapp-float{
    position:fixed;
    bottom:22px;
    left:22px;
    width:56px;height:56px;
    background:#25d366;
    color:#fff;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:1.7rem;
    box-shadow:0 4px 14px rgba(0,0,0,.25);
    text-decoration:none;
    z-index:20;
  }
  .whatsapp-float:hover{transform:scale(1.08)}

  @media(max-width:480px){
    .search-box{flex-direction:column}
    header.hero h1{font-size:1.2rem}
  }
</style>
</head>

<body>

<!-- ===== HEADER ===== -->
<header class="hero">
  <img class="logo" src="logo.png" alt="وزارة التعليم - الإدارة العامة للتعليم بمنطقة جازان">
  <h1>الإدارة المدرسية</h1>
  <p>الإدارة العامة للتعليم بمنطقة جازان</p>
</header>

<!-- ===== NAV ===== -->
<nav class="navbar">
  <ul>
    <li><a class="active" href="index.html">الشهادات</a></li>
  </ul>
</nav>

<!-- ===== CONTENT ===== -->
<div class="wrap">
  <div class="card">
    <h2>استخراج الشهادة</h2>
    <p class="sub">أدخل رقم الهوية / السجل المدني للموظف لعرض الشهادة</p>

    <div class="search-box">
      <input type="text" id="sid" inputmode="numeric" maxlength="10" placeholder="رقم الهوية">
      <button onclick="findCert()">بحث</button>
    </div>

    <div id="result"></div>
  </div>
</div>

<!-- ===== FOOTER ===== -->
<footer>
  جميع الحقوق محفوظة © 2026<br>
  الإدارة المدرسية-تعليم جازان
</footer>

<!-- ===== WHATSAPP FLOAT ===== -->
<a class="whatsapp-float"
   href="https://wa.me/966548884252"
   target="_blank"
   aria-label="تواصل عبر واتساب">
  <i class="fab fa-whatsapp"></i>
</a>

<script>
/* =========================================================
   بيانات الطلاب:
   أضف كل طالب بهذا الشكل:
   "رقم الهوية": { name: "اسم الطالب", grade: "الصف", file: "certs/اسم-الملف.pdf" }
   وضع ملفات الشهادات PDF داخل مجلد باسم certs بجانب هذا الملف
   ========================================================= */
const students = {
  "1234567890": { name: "مثال: محمد أحمد", grade: "السادس الابتدائي", file: "certs/1234567890.pdf" }
};

function findCert(){
  const id = document.getElementById('sid').value.trim();
  const box = document.getElementById('result');
  box.classList.add('show');

  if(!id){
    box.innerHTML = '<div class="notfound">الرجاء إدخال رقم الهوية</div>';
    return;
  }

  const s = students[id];
  if(s){
    box.innerHTML = `
      <div class="student">
        <p>الاسم: ${s.name}</p>
        <p>الصف: ${s.grade}</p>
        <a class="btn-cert" href="${s.file}" target="_blank">
          <i class="fas fa-download"></i> تحميل الشهادة
        </a>
      </div>`;
  }else{
    box.innerHTML = '<div class="notfound">لم يتم العثور على شهادة بهذا الرقم، تأكد من رقم الهوية</div>';
  }
}

document.getElementById('sid').addEventListener('keydown', e => {
  if(e.key === 'Enter') findCert();
});
</script>

</body>
</html>
